<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro - Premium UI</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230f172a'/><g transform='translate(20, 20) scale(2.5)' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polygon points='12 2 2 7 12 12 22 7 12 2'/><polyline points='2 12 12 17 22 12'/><polyline points='2 17 12 22 22 17'/></g></svg>">
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fafafa; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .island-spring { transition: all 0.5s cubic-bezier(0.68, -0.55, 0.26, 1.55); }
        .fade-in-out { transition: opacity 0.3s ease-in-out; }
        .glass-header { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-down { animation: fadeInDown 0.3s ease-out forwards; }
        
        .custom-prose p { margin-top: 0.5em; margin-bottom: 0.5em; }
        .custom-prose ul, .custom-prose ol { margin-top: 0.5em; margin-bottom: 0.5em; padding-left: 1.5em; }
        .custom-prose li { margin-top: 0.25em; margin-bottom: 0.25em; }
        .custom-prose table { width: 100%; border-collapse: collapse; margin-top: 1em; margin-bottom: 1em; font-size: 0.875rem; border-radius: 0.5rem; overflow: hidden; }
        .custom-prose th, .custom-prose td { border: 1px solid #e2e8f0; padding: 0.75em; text-align: left; }
        .custom-prose th { background-color: #f8fafc; font-weight: 700; color: #475569; }
        .custom-prose tr:nth-child(even) { background-color: #fcfcfc; }
    </style>
</head>
<body class="text-slate-800 flex flex-col h-screen overflow-hidden selection:bg-indigo-100 selection:text-indigo-900">

    <div id="dynamicIsland" class="fixed top-6 left-1/2 transform -translate-x-1/2 z-[999] bg-slate-900 text-white rounded-full flex items-center justify-center overflow-hidden island-spring w-0 h-0 opacity-0 shadow-2xl shadow-slate-900/20 pointer-events-none origin-center border border-slate-700/50">
        <div id="dynamicIslandContent" class="px-6 py-2.5 flex items-center space-x-3 w-max opacity-0 fade-in-out delay-100">
            <div id="di-icon" class="w-6 h-6 rounded-full bg-gradient-to-tr from-emerald-400 to-emerald-600 flex items-center justify-center shadow-inner shrink-0">
                <i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>
            </div>
            <span id="dynamicIslandText" class="text-sm font-semibold tracking-wide"></span>
        </div>
    </div>

    <div id="main-app" class="flex flex-col w-full h-full">
        
        <header class="glass-header border-b border-slate-200/60 shadow-[0_1px_2px_rgba(0,0,0,0.02)] z-40 shrink-0 sticky top-0">
            <div class="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16 sm:h-20 gap-4">
                    
                    <div class="flex items-center space-x-3 cursor-pointer shrink-0 lg:w-1/4" onclick="app.setView('list')">
                        <div class="w-9 h-9 bg-slate-900 rounded-xl flex items-center justify-center shadow-sm shrink-0">
                            <i data-lucide="layers" class="w-4.5 h-4.5 text-white"></i>
                        </div>
                        <span class="text-xl font-extrabold text-slate-900 tracking-tight hidden lg:block truncate">TaskFlow</span>
                    </div>
                    
                    <div class="flex-1 flex justify-center hidden md:flex">
                        <nav class="flex items-center relative bg-white shadow-[0_0_1px_0_rgba(24,94,224,0.15),0_6px_12px_0_rgba(24,94,224,0.15)] p-1.5 rounded-full">
                            <div id="nav-glider" class="absolute top-1.5 h-10 bg-indigo-50 rounded-full transition-all duration-300 ease-out z-0"></div>
                            <button onclick="app.setView('list')" data-nav-desktop="list" class="relative z-10 flex items-center justify-center px-4 xl:px-5 h-10 rounded-full text-sm font-bold transition-colors text-slate-500 hover:text-slate-900">
                                <i data-lucide="list" class="w-4 h-4 mr-2"></i>Daftar
                            </button>
                            <button onclick="app.setView('board')" data-nav-desktop="board" class="relative z-10 flex items-center justify-center px-4 xl:px-5 h-10 rounded-full text-sm font-bold transition-colors text-slate-500 hover:text-slate-900">
                                <i data-lucide="layout" class="w-4 h-4 mr-2"></i>Papan
                            </button>
                            <button onclick="app.setView('timeline')" data-nav-desktop="timeline" class="relative z-10 flex items-center justify-center px-4 xl:px-5 h-10 rounded-full text-sm font-bold transition-colors text-slate-500 hover:text-slate-900">
                                <i data-lucide="clock" class="w-4 h-4 mr-2"></i>Timeline
                            </button>
                            <button onclick="app.setView('settings')" data-nav-desktop="settings" id="nav-settings-desktop" class="hidden relative z-10 flex items-center justify-center px-4 xl:px-5 h-10 rounded-full text-sm font-bold transition-colors text-slate-500 hover:text-slate-900">
                                <i data-lucide="settings" class="w-4 h-4 mr-2"></i>Sistem
                            </button>
                        </nav>
                    </div>

                    <div class="flex items-center justify-end space-x-4 shrink-0 lg:w-1/4">
                        <div class="hidden xl:flex items-center bg-slate-100/80 border border-slate-200/60 rounded-full px-4 py-2 w-64 focus-within:bg-white focus-within:ring-2 focus-within:ring-indigo-500/20 focus-within:border-indigo-400 transition-all">
                            <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                            <input type="text" id="searchInput" placeholder="Cari..." class="bg-transparent border-none outline-none ml-2 text-sm w-full text-slate-700 font-medium placeholder:font-normal">
                        </div>
                        
                        <div id="auth-section-guest" class="flex items-center xl:border-l xl:border-slate-200 xl:pl-5">
                            <button onclick="app.openLoginModal()" class="flex items-center justify-center bg-slate-900 text-white hover:bg-slate-800 px-5 py-2.5 rounded-xl text-sm font-bold transition-all shadow-md shadow-slate-200 outline-none">
                                <i data-lucide="log-in" class="w-4 h-4 mr-2"></i>
                                <span>Masuk</span>
                            </button>
                        </div>

                        <div id="auth-section-user" class="hidden items-center space-x-4 xl:border-l xl:border-slate-200 xl:pl-5">
                            <div class="flex flex-col items-end hidden sm:flex">
                                <span id="userNameDisplay" class="text-sm font-bold text-slate-800"></span>
                                <span id="userEmailDisplay" class="text-[10px] font-bold text-slate-400 uppercase tracking-wider"></span>
                            </div>
                            <button onclick="app.handleLogout()" class="flex items-center justify-center bg-red-50 text-red-600 hover:bg-red-100 hover:text-red-700 px-4 py-2.5 rounded-xl text-sm font-bold transition-all outline-none" title="Keluar Akun">
                                <i data-lucide="log-out" class="w-4 h-4 mr-2 hidden xl:block"></i>
                                <i data-lucide="log-out" class="w-4 h-4 xl:hidden"></i>
                                <span class="hidden xl:block">Keluar</span>
                            </button>
                        </div>

                        <button onclick="app.toggleMobileMenu()" class="md:hidden text-slate-600 hover:text-slate-900 outline-none p-1">
                            <i data-lucide="menu" class="w-6 h-6"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div id="mobileMenu" class="md:hidden hidden border-t border-slate-100 bg-white/95 backdrop-blur-xl absolute w-full z-50 shadow-2xl pb-6 rounded-b-[2rem]">
                <div class="px-6 pt-6 pb-2 space-y-2">
                    <div class="flex items-center bg-slate-100 border border-slate-200 rounded-xl px-4 py-3 mb-6">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400"></i>
                        <input type="text" id="searchInputMobile" placeholder="Cari tugas, divisi, atau HUB..." class="bg-transparent border-none outline-none ml-3 text-sm w-full text-slate-700 font-medium">
                    </div>
                    <button onclick="app.setView('list'); app.toggleMobileMenu()" data-nav-mobile="list" class="w-full flex items-center space-x-4 px-4 py-3.5 rounded-2xl text-sm font-bold transition-all text-slate-600 hover:bg-slate-50">
                        <i data-lucide="list" class="w-5 h-5"></i><span>Daftar Tugas</span>
                    </button>
                    <button onclick="app.setView('board'); app.toggleMobileMenu()" data-nav-mobile="board" class="w-full flex items-center space-x-4 px-4 py-3.5 rounded-2xl text-sm font-bold transition-all text-slate-600 hover:bg-slate-50">
                        <i data-lucide="layout" class="w-5 h-5"></i><span>Papan Kanban</span>
                    </button>
                    <button onclick="app.setView('timeline'); app.toggleMobileMenu()" data-nav-mobile="timeline" class="w-full flex items-center space-x-4 px-4 py-3.5 rounded-2xl text-sm font-bold transition-all text-slate-600 hover:bg-slate-50">
                        <i data-lucide="clock" class="w-5 h-5"></i><span>Timeline</span>
                    </button>
                    <button onclick="app.setView('settings'); app.toggleMobileMenu()" data-nav-mobile="settings" id="nav-settings-mobile" class="hidden w-full flex items-center space-x-4 px-4 py-3.5 rounded-2xl text-sm font-bold transition-all text-slate-600 hover:bg-slate-50">
                        <i data-lucide="settings" class="w-5 h-5"></i><span>Pengaturan Sistem</span>
                    </button>
                    <div class="h-px w-full bg-slate-100 my-4"></div>
                    <div id="mobile-auth-guest">
                        <button onclick="app.openLoginModal(); app.toggleMobileMenu()" class="w-full flex items-center space-x-4 px-4 py-3.5 rounded-2xl text-sm font-bold text-indigo-600 hover:bg-indigo-50 transition-all">
                            <i data-lucide="log-in" class="w-5 h-5"></i><span>Masuk Akun</span>
                        </button>
                    </div>
                    <div id="mobile-auth-user" class="hidden">
                        <button onclick="app.handleLogout(); app.toggleMobileMenu()" class="w-full flex items-center space-x-4 px-4 py-3.5 rounded-2xl text-sm font-bold text-red-600 hover:bg-red-50 transition-all">
                            <i data-lucide="log-out" class="w-5 h-5"></i><span>Keluar Akun</span>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-auto p-4 sm:p-6 lg:p-8 flex flex-col items-center">
            <div class="w-full max-w-[1600px] flex-1 flex flex-col">
                
                <div id="top-section" class="mb-6 flex flex-col md:flex-row md:justify-between md:items-end gap-5 shrink-0 mt-2">
                    <div>
                        <h1 id="page-title" class="text-3xl sm:text-4xl font-extrabold text-slate-900 tracking-tight">Tugas Berjalan</h1>
                    </div>
                    <div class="flex flex-wrap items-center gap-3 sm:gap-4" id="action-buttons">
                        <select id="sortSelect" onchange="app.setSortBy(this.value)" class="text-sm font-bold text-slate-700 bg-white px-4 py-2.5 rounded-xl border border-slate-200/80 shadow-[0_1px_2px_rgba(0,0,0,0.02)] hover:bg-slate-50 outline-none cursor-pointer appearance-none pr-8 relative" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat, repeat; background-position: right .8em top 50%, 0 0; background-size: .65em auto, 100%;">
                            <option value="deadline_asc">Due Date Dekat</option>
                            <option value="deadline_desc">Due Date Jauh</option>
                            <option value="priority">Prioritas Tinggi</option>
                            <option value="hub">Kode HUB (A-Z)</option>
                        </select>
                        <label class="flex items-center space-x-2 text-sm text-slate-600 cursor-pointer select-none bg-white px-4 py-2.5 rounded-xl border border-slate-200/80 shadow-[0_1px_2px_rgba(0,0,0,0.02)] hover:bg-slate-50 hover:border-slate-300 transition-all">
                            <input type="checkbox" id="toggleHideDone" onchange="app.toggleHideDone(this.checked)" class="rounded border-slate-300 text-slate-900 focus:ring-slate-900 w-4 h-4">
                            <i data-lucide="eye-off" class="w-4 h-4 text-slate-400 hidden sm:block"></i>
                            <span class="font-bold">Sembunyikan Selesai</span>
                        </label>
                        <button id="btn-add-task" onclick="app.openModal()" class="hidden bg-slate-900 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-slate-800 transition-all shadow-md shadow-slate-200 flex items-center active:scale-95">
                            <i data-lucide="plus-circle" class="w-4 h-4 mr-2"></i> Buat Tugas
                        </button>
                    </div>
                </div>

                <div id="kpi-container" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8 shrink-0 w-full"></div>

                <div id="view-container" class="flex-1 min-h-0 w-full relative"></div>
            </div>
        </main>
    </div>

    <!-- Modal Login -->
    <div id="loginModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] hidden items-center justify-center p-4 transition-opacity">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100/60 w-full max-w-md relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-500 to-purple-500"></div>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-extrabold text-slate-900 flex items-center"><i data-lucide="lock" class="w-6 h-6 mr-2 text-indigo-600"></i>Masuk Akun</h2>
                <button onclick="app.closeLoginModal()" class="text-slate-400 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-2 rounded-full transition-colors outline-none">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="flex p-1 bg-slate-100 rounded-xl mb-6">
                <button id="tabStaf" onclick="app.setLoginType('staf')" class="flex-1 py-2 text-sm font-bold rounded-lg bg-white text-slate-900 shadow-sm transition-all">Staf</button>
                <button id="tabAdmin" onclick="app.setLoginType('admin')" class="flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all">Admin</button>
            </div>

            <form id="authForm" class="space-y-5" onsubmit="app.submitLogin(event)">
                <div id="idFieldContainer">
                    <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">ID Pengguna</label>
                    <input type="text" id="loginId" class="w-full px-4 py-3.5 rounded-2xl bg-slate-50/50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-semibold text-slate-800" placeholder="Masukkan ID Anda">
                </div>
                <div>
                    <label class="block text-[11px] font-bold text-slate-400 mb-2 uppercase tracking-widest">Kata Sandi</label>
                    <input type="password" id="loginPassword" required class="w-full px-4 py-3.5 rounded-2xl bg-slate-50/50 border border-slate-200 focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 outline-none transition-all font-semibold text-slate-800" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl hover:bg-slate-800 transition-all active:scale-[0.98] shadow-md mt-2 flex items-center justify-center">
                    <i data-lucide="log-in" class="w-4 h-4 mr-2"></i>Masuk Ruang Kerja
                </button>
            </form>
        </div>
    </div>

    <!-- Modal Form Task (Edit/Add) -->
    <div id="taskModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-[150] hidden items-center justify-center p-4 sm:p-6 transition-opacity">
        <div class="bg-white rounded-[2rem] shadow-2xl w-full max-w-[1200px] overflow-hidden flex flex-col max-h-[95vh] border border-slate-100/50">
            <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-center bg-white shrink-0">
                <h2 id="modalTitle" class="text-2xl font-extrabold text-slate-900 tracking-tight flex items-center">Buat Tugas</h2>
                <button onclick="app.closeModal()" class="text-slate-400 hover:text-slate-700 bg-slate-50 hover:bg-slate-100 p-2.5 rounded-full transition-colors outline-none">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            
            <div class="p-8 overflow-y-auto flex-1 hide-scrollbar bg-slate-50/30">
                <form id="taskForm" class="flex flex-col h-full">
                    <input type="hidden" id="taskId">
                    
                    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 lg:gap-8 flex-1">
                        
                        <!-- Kolom Kiri -->
                        <div class="lg:col-span-7 flex flex-col space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Judul Tugas</label>
                                <input type="text" id="taskTitle" required class="w-full px-5 py-3.5 rounded-2xl bg-white border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all font-bold text-slate-900 text-lg placeholder:font-normal">
                            </div>
                            
                            <div class="flex flex-col flex-1 min-h-[150px]">
                                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Detail Pekerjaan (Gunakan - atau 1. untuk list)</label>
                                <textarea id="taskDesc" class="flex-1 w-full px-5 py-4 rounded-2xl bg-white border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 transition-all resize-none text-sm text-slate-700 font-medium leading-relaxed"></textarea>
                            </div>

                            <div class="border-t border-slate-100 pt-4 mt-2 flex flex-col flex-1 min-h-[250px]">
                                <label class="block text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">Daftar Sub Tugas</label>
                                <div class="bg-slate-50/50 p-5 rounded-2xl border border-slate-200 mb-4 shadow-sm">
                                    <input type="text" id="newSubtaskTitle" placeholder="Judul sub tugas..." class="w-full px-5 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 mb-4 text-sm font-semibold text-slate-800">
                                    
                                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                                        <div>
                                            <label class="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-widest">Divisi</label>
                                            <select id="newSubtaskDiv" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-700 outline-none bg-white appearance-none cursor-pointer"></select>
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-widest">Kode HUB</label>
                                            <select id="newSubtaskCat" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-700 outline-none bg-white appearance-none cursor-pointer"></select>
                                        </div>
                                        <div>
                                            <label class="block text-[10px] font-bold text-slate-400 mb-1.5 uppercase tracking-widest">Prioritas</label>
                                            <select id="newSubtaskPrio" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-semibold text-slate-700 outline-none bg-white appearance-none cursor-pointer">
                                                <option value="rendah">Rendah</option>
                                                <option value="sedang" selected>Sedang</option>
                                                <option value="tinggi">Tinggi</option>
                                            </select>
                                        </div>
                                    </div>
                                    <button type="button" onclick="app.addSubtask()" class="w-full bg-slate-900 text-white px-5 py-3 rounded-xl font-bold hover:bg-slate-800 transition-colors shadow-md shadow-slate-200 active:scale-95 flex items-center justify-center">
                                        <i data-lucide="list-plus" class="w-4 h-4 mr-2"></i>Tambah Sub Tugas
                                    </button>
                                </div>
                                <div id="subtaskList" class="space-y-3 flex-1 overflow-y-auto custom-scrollbar pr-2 min-h-[100px]"></div>
                            </div>
                        </div>

                        <!-- Kolom Kanan -->
                        <div class="lg:col-span-5 flex flex-col space-y-4 lg:pl-6 lg:border-l lg:border-slate-100">
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Divisi (Pilih lebih dari satu)</label>
                                    <div id="divisionPills" class="flex flex-wrap gap-2.5"></div>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Kode HUB</label>
                                    <div id="kodeHubPills" class="flex flex-wrap gap-2.5"></div>
                                </div>
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Prioritas</label>
                                    <div id="priorityPills" class="flex flex-wrap gap-2.5"></div>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest">Due Date</label>
                                    <input type="date" id="taskDueDate" required class="w-full px-5 py-3.5 rounded-2xl bg-white border border-slate-200 focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-400 font-bold text-slate-700 transition-all">
                                </div>

    <script>
        var SUPABASE_URL = 'https://ktqgtutzgivxjwtdqcbw.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt0cWd0dXR6Z2l2eGp3dGRxY2J3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NjU4NjcsImV4cCI6MjA5MDU0MTg2N30.VAg8ZCAb9pxluoU1hg6pqfPPr81N9DNH2qTIkcXgmYM';
        var supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const app = {
            state: {
                user: null,
                userName: '',
                role: 'guest',
                loginType: 'staf',
                view: 'list',
                searchQuery: '',
                sortBy: 'deadline_asc',

            dialogResolve: null,

            async init() {
                this.cacheDOM();
                this.bindEvents();
                await this.checkAuth();
                await this.fetchData();
                window.addEventListener('resize', () => this.setView(this.state.view));

            cacheDOM() {
                this.mainApp = document.getElementById('main-app');
                this.viewContainer = document.getElementById('view-container');
                this.kpiContainer = document.getElementById('kpi-container');
                this.searchInput = document.getElementById('searchInput');
                this.searchInputMobile = document.getElementById('searchInputMobile');
                this.modal = document.getElementById('taskModal');
                this.detailModal = document.getElementById('detailModal');
                this.loginModal = document.getElementById('loginModal');
                this.pageTitle = document.getElementById('page-title');
                this.actionButtons = document.getElementById('action-buttons');
                this.mobileMenu = document.getElementById('mobileMenu');
                
                this.fId = document.getElementById('taskId');
                this.fTitle = document.getElementById('taskTitle');
                this.fDesc = document.getElementById('taskDesc');
                this.fDue = document.getElementById('taskDueDate');
                this.fStatus = document.getElementById('taskStatus');
                this.fUpdateLog = document.getElementById('taskUpdateLog');
                
                this.editFields = document.getElementById('editFields');
                this.historyContainer = document.getElementById('updateHistoryContainer');
                this.historyList = document.getElementById('updateHistoryList');
            },

            bindEvents() {
                const searchHandler = (e) => {
                    this.state.searchQuery = e.target.value.toLowerCase();
                    if(e.target.id === 'searchInput') this.searchInputMobile.value = e.target.value;
                    if(e.target.id === 'searchInputMobile') this.searchInput.value = e.target.value;
                    this.render();
                };
                this.searchInput.addEventListener('input', searchHandler);
                this.searchInputMobile.addEventListener('input', searchHandler);

                const handleExcelPaste = (e) => {
                    const clipboardData = e.clipboardData || window.clipboardData;
                    if (!clipboardData) return;
                    const pastedData = clipboardData.getData('Text');
                    
                    if (pastedData.includes('\t') && pastedData.includes('\n')) {
                        const rows = pastedData.trim().split('\n');
                        const isTable = rows.length > 1 && rows.some(row => row.includes('\t'));
                        
                        if (isTable) {
                            e.preventDefault();
                            let mdTable = '\n\n';
                            rows.forEach((row, i) => {
                                const cols = row.split('\t').map(c => c.trim());
                                mdTable += '| ' + cols.join(' | ') + ' |\n';
                                if (i === 0) {
                                    mdTable += '|' + cols.map(() => '---').join('|') + '|\n';
                                }
                            });
                            mdTable += '\n';
                            
                            const target = e.target;
                            const start = target.selectionStart;
                            const end = target.selectionEnd;
                            target.value = target.value.substring(0, start) + mdTable + target.value.substring(end);
                            target.selectionStart = target.selectionEnd = start + mdTable.length;
                        }
                    }
                };

                const descInput = document.getElementById('taskDesc');
                const logInput = document.getElementById('taskUpdateLog');
                const dialogInput = document.getElementById('dialogInput');
                
                if (descInput) descInput.addEventListener('paste', handleExcelPaste);
                if (logInput) logInput.addEventListener('paste', handleExcelPaste);
                if (dialogInput) dialogInput.addEventListener('paste', handleExcelPaste);
            },

            toggleMobileMenu() {
                this.mobileMenu.classList.toggle('hidden');
            },

            showNotification(msg, type = 'success') {
                const di = document.getElementById('dynamicIsland');
                const content = document.getElementById('dynamicIslandContent');
                const text = document.getElementById('dynamicIslandText');
                const iconContainer = document.getElementById('di-icon');

                text.innerText = msg;

                if (type === 'error') {
                    iconContainer.className = 'w-6 h-6 rounded-full bg-gradient-to-tr from-rose-400 to-red-600 flex items-center justify-center shadow-inner shrink-0';
                    iconContainer.innerHTML = '<i data-lucide="x" class="w-3.5 h-3.5 text-white"></i>';
                } else {
                    iconContainer.className = 'w-6 h-6 rounded-full bg-gradient-to-tr from-emerald-400 to-teal-500 flex items-center justify-center shadow-inner shrink-0';
                    iconContainer.innerHTML = '<i data-lucide="check" class="w-3.5 h-3.5 text-white"></i>';
                }
                lucide.createIcons();

                di.className = `fixed top-6 left-1/2 transform -translate-x-1/2 z-[999] bg-white text-slate-800 rounded-full flex items-center justify-center overflow-hidden island-spring shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] border border-slate-100 origin-center w-0 h-0 opacity-0`;
                void di.offsetWidth;

                di.style.width = 'auto';
                di.style.minWidth = '240px';
                di.classList.remove('w-0', 'h-0', 'opacity-0');
                di.classList.add('h-12', 'opacity-100');
                
                setTimeout(() => {
                    content.classList.remove('opacity-0');
                    content.classList.add('opacity-100');
                }, 200);

                setTimeout(() => {
                    content.classList.remove('opacity-100');
                    content.classList.add('opacity-0');
                    setTimeout(() => {
                        di.style.minWidth = '0px';
                        di.classList.remove('h-12', 'opacity-100');
                        di.classList.add('w-0', 'h-0', 'opacity-0');
                    }, 300);
                }, 3500);
            },

            showDialog(type, message, defaultValue = '') {
                return new Promise((resolve) => {
                    const dialog = document.getElementById('customDialog');
                    const title = document.getElementById('dialogTitle');
                    const msg = document.getElementById('dialogMessage');
                    const input = document.getElementById('dialogInput');
                    const btnCancel = document.getElementById('dialogBtnCancel');
                    const btnConfirm = document.getElementById('dialogBtnConfirm');

                    msg.innerText = message;
                    this.dialogResolve = resolve;

                    input.classList.add('hidden');
                    btnCancel.classList.add('hidden');
                    input.value = '';

                    if (type === 'confirm') {
                        title.innerText = 'Konfirmasi Aksi';
                        btnCancel.classList.remove('hidden');
                        btnConfirm.innerHTML = '<i data-lucide="check" class="w-4 h-4 mr-2 shrink-0"></i>Ya, Lanjutkan';
                    } else if (type === 'prompt') {
                        title.innerText = 'Edit Data';
                        input.classList.remove('hidden');
                        btnCancel.classList.remove('hidden');
                        btnConfirm.innerHTML = '<i data-lucide="save" class="w-4 h-4 mr-2 shrink-0"></i>Simpan';
                        input.value = defaultValue;
                        setTimeout(() => input.focus(), 100);
                    }

                    dialog.classList.remove('hidden');
                    dialog.classList.add('flex');
                    lucide.createIcons();

                    btnConfirm.onclick = () => {
                        this.closeDialog();
                        if (type === 'prompt') resolve(input.value);
                        else resolve(true);
                    };

                    btnCancel.onclick = () => {
                        this.closeDialog();
                        if (type === 'prompt') resolve(null);
                        else resolve(false);
                    };
                });
            },

            closeDialog() {
                const dialog = document.getElementById('customDialog');
                dialog.classList.add('hidden');
                dialog.classList.remove('flex');
            },

            async showConfirm(msg) {
                return await this.showDialog('confirm', msg);
            },

            async showPrompt(msg, defaultVal) {
                return await this.showDialog('prompt', msg, defaultVal);
            },

            async checkAuth() {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    this.state.user = session.user;
                    const kodeIdentitas = session.user.email.split('@')[0];
                    await this.loadUserProfile(kodeIdentitas);
                    document.getElementById('userEmailDisplay').innerText = `ID: ${kodeIdentitas}`;
                    document.getElementById('userNameDisplay').innerText = this.state.userName;
                    this.updateHeaderAuthUI(true);
                } else {
                    this.state.user = null;
                    this.state.role = 'guest';
                    this.updateHeaderAuthUI(false);
                }
            },

            updateHeaderAuthUI(isLoggedIn) {
                const guestSection = document.getElementById('auth-section-guest');
                const userSection = document.getElementById('auth-section-user');
                const mobileGuest = document.getElementById('mobile-auth-guest');
                const mobileUser = document.getElementById('mobile-auth-user');
                const btnAdd = document.getElementById('btn-add-task');

                if (isLoggedIn) {
                    guestSection.classList.add('hidden');
                    userSection.classList.remove('hidden');
                    mobileGuest.classList.add('hidden');
                    mobileUser.classList.remove('hidden');
                    if(btnAdd) btnAdd.classList.remove('hidden');
                    if (this.state.role === 'admin') {
                        document.getElementById('nav-settings-desktop').classList.remove('hidden');
                        document.getElementById('nav-settings-mobile').classList.remove('hidden');
                    }
                } else {
                    guestSection.classList.remove('hidden');
                    userSection.classList.add('hidden');
                    mobileGuest.classList.remove('hidden');
                    mobileUser.classList.add('hidden');
                    if(btnAdd) btnAdd.classList.add('hidden');
                    document.getElementById('nav-settings-desktop').classList.add('hidden');
                    document.getElementById('nav-settings-mobile').classList.add('hidden');
                    
                    if (this.state.view === 'settings') {
                        this.setView('list');
                    }
                }
            },

            async loadUserProfile(kodeIdentitas) {
                const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', this.state.user.id).single();
                
                if (profile) {
                    this.state.role = profile.role;
                    this.state.userName = profile.name || kodeIdentitas;
                } else {
                    const assignedRole = kodeIdentitas === 'admin' ? 'admin' : 'user';
                    const defaultName = kodeIdentitas === 'admin' ? 'Administrator' : kodeIdentitas;
                    await supabaseClient.from('profiles').insert([{ id: this.state.user.id, email: kodeIdentitas, name: defaultName, role: assignedRole }]);
                    this.state.role = assignedRole;
                    this.state.userName = defaultName;
                }
            },

            openLoginModal() {
                this.setLoginType('staf');
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginModal').classList.remove('hidden');
                document.getElementById('loginModal').classList.add('flex');
            },

            closeLoginModal() {
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('loginModal').classList.remove('flex');
            },

            setLoginType(type) {
                this.state.loginType = type;
                const tabStaf = document.getElementById('tabStaf');
                const tabAdmin = document.getElementById('tabAdmin');
                const idContainer = document.getElementById('idFieldContainer');
                const loginId = document.getElementById('loginId');

                if (type === 'admin') {
                    tabAdmin.className = "flex-1 py-2 text-sm font-bold rounded-lg bg-white text-slate-900 shadow-sm transition-all";
                    tabStaf.className = "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all";
                    idContainer.classList.add('hidden');
                    loginId.value = 'admin';
                } else {
                    tabStaf.className = "flex-1 py-2 text-sm font-bold rounded-lg bg-white text-slate-900 shadow-sm transition-all";
                    tabAdmin.className = "flex-1 py-2 text-sm font-bold rounded-lg text-slate-500 hover:text-slate-700 transition-all";
                    idContainer.classList.remove('hidden');
                    loginId.value = '';
                }
            },

            async submitLogin(e) {
                e.preventDefault();
                let kodeAkses = document.getElementById('loginId').value.trim().toLowerCase();
                const password = document.getElementById('loginPassword').value;
                
                if (this.state.loginType === 'admin') {
                    kodeAkses = 'admin';
                }

                if (!kodeAkses) {
                    this.showNotification('Harap isi ID Pengguna', 'error');
                    return;
                }

                const email = `${kodeAkses}@taskflow.local`;
                
                let { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                
                if (error && error.message.includes('Invalid login')) {
                    if (kodeAkses === 'admin') {
                        const { data: signUpData, error: signUpError } = await supabaseClient.auth.signUp({ email, password });
                        if (signUpError) {
                            this.showNotification(signUpError.message, 'error');
                            return;
                        }
                        data = signUpData;
                    } else {
                        this.showNotification('ID Akses atau Kata Sandi salah.', 'error');
                        return;
                    }
                } else if (error) {
                    this.showNotification(error.message, 'error');
                    return;
                }

                if (data && data.session) {
                    this.closeLoginModal();
                    this.showNotification('Otentikasi berhasil', 'success');
                    await this.checkAuth();
                    this.render();
                }
            },

            async handleLogout() {
                await supabaseClient.auth.signOut();
                this.state.user = null;
                this.state.role = 'guest';
                this.updateHeaderAuthUI(false);
                this.showNotification('Berhasil keluar', 'success');
                this.render();
            },

            async fetchData() {
                const [divs, cats, tasksRes, updatesRes, profilesRes] = await Promise.all([
                    supabaseClient.from('divisions').select('*').order('name'),
                    supabaseClient.from('categories').select('*').order('name'),
                    supabaseClient.from('tasks').select('*').order('due_date', { ascending: true }),
                    supabaseClient.from('task_updates').select('*').order('created_at', { ascending: true }),
                    supabaseClient.from('profiles').select('id, role')
                ]);

                this.state.divisions = divs.data || [];
                this.state.categories = cats.data || [];
                this.state.profiles = profilesRes.data || [];
                
                const updates = updatesRes.data || [];
                const tasks = tasksRes.data || [];
                
                this.state.tasks = tasks.map(t => ({
                    ...t,
                    subtasks: t.subtasks || [],
                    updates: updates.filter(u => u.task_id === t.id).map(u => ({
                        id: u.id,
                        date: u.created_at ? new Date(u.created_at + (u.created_at.endsWith('Z') ? '' : 'Z')).toLocaleString('id-ID', {day: 'numeric', month: 'short', hour:'2-digit', minute:'2-digit'}) : '',
                        text: u.text,
                        userName: u.user_name || 'Pengguna'
                    }))
                }));

                this.render();
            },

                    divSelect.innerHTML = '<option value="">Pilih Divisi</option>' + this.state.divisions.map(d => `<option value="${d.name}">${d.name}</option>`).join('');

                    catSelect.innerHTML = '<option value="">Pilih Kode HUB</option>' + this.state.categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

                    divContainer.innerHTML = this.state.divisions.map(d => {
                        const active = this.formState.divisions.includes(d.name);
                        const baseCls = "px-4 py-2.5 rounded-xl text-sm font-bold transition-all outline-none border cursor-pointer select-none";
                        const activeCls = active ? "bg-indigo-600 text-white border-indigo-600 shadow-md shadow-indigo-200 scale-[0.98]" : "bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-100 hover:text-slate-800";
                        return `<button type="button" onclick="app.toggleFormDivision('${d.name}')" class="${baseCls} ${activeCls}">${d.name}</button>`;
                    }).join('');
                }

                const catContainer = document.getElementById('kodeHubPills');
                if(catContainer) {
                    catContainer.innerHTML = this.state.categories.map(c => {
                        const active = this.formState.category === c.name;
                        const baseCls = "px-4 py-2.5 rounded-xl text-sm font-bold transition-all outline-none border cursor-pointer select-none";
                        const activeCls = active ? "bg-slate-900 text-white border-slate-900 shadow-md shadow-slate-200 scale-[0.98]" : "bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-100 hover:text-slate-800";
                        return `<button type="button" onclick="app.setFormCategory('${c.name}')" class="${baseCls} ${activeCls}">${c.name}</button>`;
                    }).join('');
                }

                const prioContainer = document.getElementById('priorityPills');
                if(prioContainer) {
                    const priorities = [
                        { id: 'rendah', label: 'Rendah', activeColor: 'bg-sky-500 border-sky-500 text-white shadow-md shadow-sky-200 scale-[0.98]' },
                        { id: 'sedang', label: 'Sedang', activeColor: 'bg-amber-500 border-amber-500 text-white shadow-md shadow-amber-200 scale-[0.98]' },
                        { id: 'tinggi', label: 'Tinggi', activeColor: 'bg-rose-500 border-rose-500 text-white shadow-md shadow-rose-200 scale-[0.98]' }
                    ];
                    prioContainer.innerHTML = priorities.map(p => {
                        const active = this.formState.priority === p.id;
                        const baseCls = "px-4 py-2.5 rounded-xl text-sm font-bold transition-all outline-none border cursor-pointer select-none";
                        const inactiveCls = "bg-slate-50 text-slate-500 border-slate-200 hover:bg-slate-100 hover:text-slate-800";
                        return `<button type="button" onclick="app.setFormPriority('${p.id}')" class="${baseCls} ${active ? p.activeColor : inactiveCls}">${p.label}</button>`;
                    }).join('');
                }
            },

                if (this.formState.divisions.includes(name)) {
                    this.formState.divisions = this.formState.divisions.filter(d => d !== name);

                }

                this.renderFormPills();
            },

            setFormPriority(level) {
                this.formState.priority = level;

            },

                                </button>

            addSubtask() {
                const titleInput = document.getElementById('newSubtaskTitle');

                const catInput = document.getElementById('newSubtaskCat');
                const prioInput = document.getElementById('newSubtaskPrio');

                this.renderSubtaskListModal();
            },

                this.formState.subtasks = this.formState.subtasks.filter(s => s.id !== id);
                this.renderSubtaskListModal();
            },

            setTimelineMode(mode) {

                this.render();
            },

                d.setMonth(d.getMonth() + offset);
                this.render();

                this.state.sortBy = val;

            setView(viewName) {
                this.state.view = viewName;
                
                // Update Desktop Nav
                const desktopBtns = document.querySelectorAll('button[data-nav-desktop]');
                const glider = document.getElementById('nav-glider');

                        btn.classList.add('text-indigo-600');
                        btn.classList.remove('text-slate-500', 'hover:text-slate-900');

                // Update Mobile Nav

                        btn.classList.add('text-indigo-600', 'bg-indigo-50');
                        btn.classList.remove('text-slate-600', 'hover:bg-slate-50');

                } else {
                    this.pageTitle.innerText = "Tugas Berjalan";

                    if(document.getElementById('action-buttons')) document.getElementById('action-buttons').classList.remove('hidden');

            toggleHideDone(isFiltered) {
                this.state.hideDone = isFiltered;
                this.render();
            },

            async toggleTaskSubtaskDetail(taskId, subtaskId, event) {
                if (event) event.stopPropagation();
                if (this.state.role === 'guest') return;
                
                const taskIndex = this.state.tasks.findIndex(t => t.id === taskId);
                if (taskIndex === -1) return;
                
                const task = this.state.tasks[taskIndex];
                const updatedSubtasks = task.subtasks.map(st => 
                    st.id === subtaskId ? { ...st, completed: !st.completed } : st
                );
                
                this.state.tasks[taskIndex].subtasks = updatedSubtasks;
                
                this.renderDetailContent(taskId);
                this.renderList(this.getFilteredTasks());
                
                await supabaseClient.from('tasks').update({ subtasks: updatedSubtasks }).eq('id', taskId);
            },

            getFilteredTasks() {
                let filtered = this.state.tasks.filter(t => {
                    const taskCreator = this.state.profiles.find(p => p.id === t.user_id);
                    const isTaskByAdmin = taskCreator && taskCreator.role === 'admin';
                    
                    if (isTaskByAdmin) {
                        if (!this.state.user || this.state.user.id !== t.user_id) {
                            return false;
                        }
                    }

                    const q = this.state.searchQuery;
                    const subtasksMatch = t.subtasks && t.subtasks.some(st => (st.text || '').toLowerCase().includes(q));
                    const updatesMatch = t.updates && t.updates.some(u => (u.text || '').toLowerCase().includes(q));

                    const matchSearch = (t.title || '').toLowerCase().includes(q) ||
                                        (t.description || '').toLowerCase().includes(q) ||
                                        (t.division || '').toLowerCase().includes(q) ||
                                        (t.category || '').toLowerCase().includes(q) ||
                                        subtasksMatch ||
                                        updatesMatch;
                    
                    const matchVisibility = this.state.hideDone ? t.status !== 'selesai' : true;
                    return matchSearch && matchVisibility;
                });

                filtered.sort((a, b) => {
                    if (this.state.sortBy === 'deadline_asc') {
                        return new Date(a.due_date) - new Date(b.due_date);
                    } else if (this.state.sortBy === 'deadline_desc') {
                        return new Date(b.due_date) - new Date(a.due_date);
                    } else if (this.state.sortBy === 'priority') {
                        const weight = { tinggi: 3, sedang: 2, rendah: 1 };
                        const wa = weight[a.priority] || 0;
                        const wb = weight[b.priority] || 0;
                        return wb - wa;
                    } else if (this.state.sortBy === 'hub') {
                        return (a.category || '').localeCompare(b.category || '');
                    }
                    return 0;
                });

                return filtered;
            },

            getPriorityColor(priority) {
                const map = { 'tinggi': 'bg-rose-50 text-rose-600 border-rose-100', 'sedang': 'bg-amber-50 text-amber-600 border-amber-100', 'rendah': 'bg-sky-50 text-sky-600 border-sky-100' };
                return map[priority] || 'bg-slate-50 text-slate-600 border-slate-200';
            },

            formatDateRange(createdAt, status) {
                if (!createdAt) return '';
                const created = new Date(createdAt + (createdAt.endsWith('Z') ? '' : 'Z'));
                const dateStr = created.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
                
                if (status === 'selesai') return `Dibuat: ${dateStr}`;
                
                const now = new Date();
                const diffMs = now - created;
                const diffMins = Math.floor(diffMs / 60000);
                const diffHours = Math.floor(diffMins / 60);
                const diffDays = Math.floor(diffHours / 24);
                
                let elapsed = '';
                if (diffDays > 0) elapsed = `${diffDays} hari berjalan`;
                else if (diffHours > 0) elapsed = `${diffHours} jam berjalan`;
                else elapsed = `${diffMins} menit berjalan`;

                return `Dibuat: ${dateStr} • ${elapsed}`;
            },

            async updateStatus(id, newStatus) {
                if (this.state.role === 'guest') return;
                const now = new Date().toISOString();
                const updateData = { status: newStatus, updated_at: now };
                if (newStatus === 'selesai') updateData.completed_at = now;
                else updateData.completed_at = null;

                await supabaseClient.from('tasks').update(updateData).eq('id', id);
                this.showNotification('Status diperbarui');
                await this.fetchData();
            },

            async deleteTask(id) {
                if (this.state.role === 'guest') return;
                if(await this.showConfirm('Data yang dihapus tidak dapat dikembalikan. Lanjutkan?')) {
                    await supabaseClient.from('tasks').delete().eq('id', id);
                    this.showNotification('Tugas dihapus permanen');
                    await this.fetchData();
                }
            },

            openDetailModal(id) {
                this.state.currentDetailTaskId = id;
                this.renderDetailContent(id);
                this.detailModal.classList.remove('hidden');
                this.detailModal.classList.add('flex');

            closeDetailModal() {

                                <div class="flex flex-wrap items-center gap-2 mt-2.5">

                                    <span class="text-[10px] font-bold text-slate-500 bg-slate-50 border border-slate-100 px-2 py-1 rounded-md">${st.division || 'Tanpa Divisi'}</span>
                                    <span class="text-[10px] font-bold text-slate-500 bg-slate-50 border border-slate-100 px-2 py-1 rounded-md">${st.category || 'Tanpa Kode HUB'}</span>

                    `).join('');
                } else {
                    stContainer.innerHTML = '<p class="text-sm text-slate-400 font-medium italic">Tidak ada sub tugas terdaftar.</p>';
                }

                const histContainer = document.getElementById('dtlHistory');
                if (task.updates && task.updates.length > 0) {
                    histContainer.innerHTML = task.updates.slice().reverse().map(u => `
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                            <div class="flex justify-between items-center mb-1.5">
                                <span class="text-[9px] text-indigo-500 font-extrabold uppercase tracking-widest">${u.date}</span>
                                <span class="text-[9px] bg-slate-100 text-slate-500 px-2 py-0.5 rounded-md font-bold">${u.userName}</span>
                            </div>
                            <div class="custom-prose prose prose-sm prose-slate max-w-none text-xs text-slate-700 font-bold leading-relaxed">${marked.parse(u.text)}</div>
                        </div>
                    `).join('');
                } else {
                    histContainer.innerHTML = '<p class="text-xs text-slate-400 font-medium italic">Belum ada pembaruan progres.</p>';
                }

                const btnEdit = document.getElementById('btnEditDetail');
                if (this.state.role !== 'guest') {

            },

            openModal(id = null) {

                    this.formState.category = task.category;
                    this.formState.priority = task.priority;
                    this.formState.subtasks = task.subtasks ? [...task.subtasks] : [];

                                        <button type="button" onclick="app.deleteUpdateLog(${u.id}, ${task.id})" class="text-[10px] font-bold text-red-600 hover:text-red-800 uppercase tracking-widest flex items-center outline-none"><i data-lucide="trash-2" class="w-3 h-3 mr-1"></i>Hapus</button>

            async saveTask() {
                if (this.state.role === 'guest') return;
                if(!this.fTitle.value.trim() || !this.fDue.value) {
                    this.showNotification('Mohon lengkapi judul dan Due Date', 'error');
                    return;
                }
                const isEditing = !!this.fId.value;
                const now = new Date().toISOString();
                
                const taskData = {
                    title: this.fTitle.value,
                    description: this.fDesc.value,
                    division: this.formState.divisions.join(', ') || 'Tanpa Divisi',
                    category: this.formState.category || 'Tanpa Kode HUB',
                    priority: this.formState.priority,
                    subtasks: this.formState.subtasks,
                    due_date: this.fDue.value,
                    status: isEditing ? this.fStatus.value : 'mulai',
                    updated_at: now
                };

                if(isEditing) {
                    if (taskData.status === 'selesai') taskData.completed_at = now;
                    else taskData.completed_at = null;
                    
                    await supabaseClient.from('tasks').update(taskData).eq('id', this.fId.value);
                    
                    if(this.fUpdateLog.value.trim()) {
                        await supabaseClient.from('task_updates').insert([{ 
                            task_id: this.fId.value, 
                            text: this.fUpdateLog.value.trim(), 
                            created_at: now,
                            user_name: this.state.userName
                        }]);
                    }
                    this.showNotification('Perubahan disimpan');
                } else {
                    taskData.created_at = now;
                    taskData.user_id = this.state.user.id;
                    await supabaseClient.from('tasks').insert([taskData]);
                    this.showNotification('Tugas baru dibuat');
                }
                
                this.closeModal();
                await this.fetchData();
            },

            async editUpdateLog(updateId, taskId) {
                const task = this.state.tasks.find(t => t.id === taskId);
                const update = task.updates.find(u => u.id === updateId);
                if (!update) return;

                const newText = await this.showPrompt('Edit catatan progres', update.text);
                if (newText && newText.trim() !== '' && newText !== update.text) {
                    await supabaseClient.from('task_updates').update({ text: newText.trim() }).eq('id', updateId);
                    this.showNotification('Catatan progres diperbarui');
                    await this.fetchData();
                    if (!this.modal.classList.contains('hidden')) {
                        this.openModal(taskId);
                    }
                }
            },

            async deleteUpdateLog(updateId, taskId) {

                    const doneSt = task.subtasks?.filter(s => s.completed).length || 0;
                    const stHtml = totalSt > 0 ? `<span class="bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded-lg text-[10px] font-bold flex items-center"><i data-lucide="check-square" class="w-3 h-3 mr-1"></i>${doneSt}/${totalSt}</span>` : '';

                    html += `
                    <div class="flex flex-col bg-white rounded-[2rem] shadow-sm border border-slate-200/60 hover:shadow-md transition-shadow h-full overflow-hidden">
                        <div class="flex flex-col sm:flex-row sm:items-center justify-between p-6 gap-5">

                                        ${stHtml}

                                <span class="text-xs font-bold text-slate-400 text-right flex items-center shrink-0"><i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5 inline"></i>${task.due_date}</span>
                                <div class="flex items-center gap-2 shrink-0">
                                    <button onclick="app.openDetailModal(${task.id})" class="flex items-center justify-center text-[11px] font-extrabold text-indigo-600 hover:text-indigo-800 bg-indigo-50 hover:bg-indigo-100 px-3 py-2 rounded-xl transition-colors outline-none uppercase tracking-wider">
                                        Detail <i data-lucide="maximize-2" class="w-4 h-4 ml-1.5"></i>

                                    ${actionBtns}

                    </div>`;
                });
                html += `</div>`;
                this.viewContainer.innerHTML = html;
            },

            renderBoard(tasks) {
                const cols = [
                    { id: 'mulai', title: 'Antrean', color: 'bg-slate-100 text-slate-600', dot: 'bg-slate-400' }, 
                    { id: 'proses', title: 'Dalam Proses', color: 'bg-indigo-100 text-indigo-700', dot: 'bg-indigo-500' },
                    { id: 'waiting', title: 'Tertunda', color: 'bg-amber-100 text-amber-700', dot: 'bg-amber-500' },

                cols.forEach(col => {
                    const colTasks = tasks.filter(t => t.status === col.id);
                    html += `<div class="min-w-[320px] w-[320px] bg-slate-100/50 rounded-[2rem] p-5 border border-slate-200/50 h-full flex flex-col shrink-0">

                            <h3 class="font-extrabold text-sm text-slate-800 flex items-center"><div class="w-2.5 h-2.5 rounded-full ${col.dot} mr-2.5 shadow-sm"></div>${col.title}</h3>

                    colTasks.forEach(task => {
                        const isDone = task.status === 'selesai';
                        const pointerClass = 'cursor-pointer hover:shadow-lg hover:-translate-y-0.5';
                        const onclickStr = `onclick="app.openDetailModal(${task.id})"`;
                        
                        const totalSt = task.subtasks?.length || 0;
                        const doneSt = task.subtasks?.filter(s => s.completed).length || 0;
                        const stHtml = totalSt > 0 ? `<span class="text-[10px] font-extrabold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-lg flex items-center"><i data-lucide="check-square" class="w-3 h-3 mr-1"></i>${doneSt}/${totalSt}</span>` : '';

                        html += `
