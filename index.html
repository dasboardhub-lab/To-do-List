                                <span class="px-2.5 py-1 rounded-lg text-[9px] font-extrabold uppercase tracking-widest border ${this.getPriorityColor(task.priority)}">${task.priority}</span>
                                <span class="text-[10px] font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded-lg">${task.division}</span>
                            </div>
                            <h4 class="font-bold text-[15px] leading-snug mb-4 ${isDone ? 'line-through text-slate-400' : 'text-slate-800'}">${task.title}</h4>
                            <div class="flex items-center justify-between pt-3.5 border-t border-slate-50">
                                <span class="text-[11px] font-bold text-slate-400 flex items-center"><i data-lucide="clock" class="w-3.5 h-3.5 mr-1.5 text-slate-300"></i>${task.due_date}</span>
                                <div class="flex items-center space-x-2">
                                    ${stHtml}
                                    ${task.updates && task.updates.length > 0 ? `<span class="text-[10px] font-extrabold text-amber-600 bg-amber-50 px-2 py-1 rounded-lg flex items-center"><i data-lucide="message-square" class="w-3 h-3 mr-1.5"></i>${task.updates.length}</span>` : ''}
                                </div>
                            </div>
                        </div>`;
                    });
                    html += `</div></div>`;
                });
                html += `</div>`;
                this.viewContainer.innerHTML = html;
            },

            renderTimeline(tasks) {
                if (!this.state.timelineMode) this.state.timelineMode = 'gantt';
                if (!this.state.calendarDate) this.state.calendarDate = new Date();

                const activeTasks = tasks.filter(t => t.status !== 'selesai');
                
                let headerHtml = `
                    <div class="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50/50 shrink-0">
                        <div class="flex items-center space-x-3">
                            ${this.state.timelineMode === 'calendar' ? `
                            <button onclick="app.changeCalendarMonth(-1)" class="p-2 rounded-lg bg-white shadow-sm border border-slate-200 hover:bg-slate-50 text-slate-600 transition-colors"><i data-lucide="chevron-left" class="w-4 h-4"></i></button>
                            <h3 class="text-sm font-extrabold text-slate-800 w-32 text-center" id="calendarMonthLabel"></h3>
                            <button onclick="app.changeCalendarMonth(1)" class="p-2 rounded-lg bg-white shadow-sm border border-slate-200 hover:bg-slate-50 text-slate-600 transition-colors"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                            ` : `
                            <h3 class="text-sm font-extrabold text-slate-800 ml-2">Bagan Timeline</h3>
                            `}
                        </div>
                        <div class="flex bg-slate-200/50 p-1 rounded-xl">
                            <button onclick="app.setTimelineMode('gantt')" class="${this.state.timelineMode === 'gantt' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'} px-4 py-2 text-xs font-bold rounded-lg transition-all flex items-center"><i data-lucide="bar-chart-2" class="w-3.5 h-3.5 mr-1.5"></i> Bagan</button>
                            <button onclick="app.setTimelineMode('calendar')" class="${this.state.timelineMode === 'calendar' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-500 hover:text-slate-700'} px-4 py-2 text-xs font-bold rounded-lg transition-all flex items-center"><i data-lucide="calendar" class="w-3.5 h-3.5 mr-1.5"></i> Kalender</button>
                        </div>
                    </div>
                `;

                if (this.state.timelineMode === 'calendar') {
                    const year = this.state.calendarDate.getFullYear();
                    const month = this.state.calendarDate.getMonth();
                    const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
                    const dayNames = ['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'];

                    const firstDay = new Date(year, month, 1).getDay();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();

                    let gridHtml = `<div class="flex-1 p-4 bg-slate-50 flex flex-col h-full min-h-[400px] overflow-hidden"><div class="grid grid-cols-7 gap-1 flex-1 h-full">`;
                    
                    dayNames.forEach(d => {
                        gridHtml += `<div class="bg-slate-200/50 rounded-lg flex items-center justify-center h-8 text-[10px] font-extrabold text-slate-500 uppercase tracking-widest">${d}</div>`;
                    });

                    for(let i = 0; i < firstDay; i++) {
                        gridHtml += `<div class="bg-transparent rounded-xl border border-transparent"></div>`;
                    }

                    for(let day = 1; day <= daysInMonth; day++) {
                        const dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                        const dayTasks = activeTasks.filter(t => t.due_date === dateStr);
                        
                        const isToday = new Date().toDateString() === new Date(year, month, day).toDateString();
                        const dateClass = isToday ? 'bg-indigo-600 text-white' : 'text-slate-600';
                        const wrapperClass = isToday ? 'border-indigo-200 bg-indigo-50/10' : 'border-slate-200 bg-white hover:border-slate-300 transition-colors';

                        gridHtml += `<div class="rounded-xl border ${wrapperClass} p-2 flex flex-col h-full overflow-hidden">
                            <div class="w-6 h-6 flex items-center justify-center rounded-full text-xs font-bold mb-2 shrink-0 ${dateClass}">${day}</div>
                            <div class="flex-1 space-y-1.5 overflow-y-auto custom-scrollbar pr-1">`;
                        
                        dayTasks.forEach(t => {
                            const map = { 'tinggi': 'bg-rose-100 text-rose-700 border-rose-200', 'sedang': 'bg-amber-100 text-amber-700 border-amber-200', 'rendah': 'bg-sky-100 text-sky-700 border-sky-200' };
                            const bg = map[t.priority] || 'bg-slate-100 text-slate-700';
                            const pointer = this.state.role !== 'guest' ? 'cursor-pointer' : '';
                            const onclick = this.state.role !== 'guest' ? `onclick="app.openDetailModal(${t.id})"` : '';
                            gridHtml += `<div ${onclick} class="text-[9px] font-bold px-1.5 py-1 rounded border truncate ${pointer} hover:shadow-sm transition-all ${bg}" title="${t.title.replace(/"/g, '&quot;')}">${t.title}</div>`;
                        });

                        gridHtml += `</div></div>`;
                    }

                    const totalCells = firstDay + daysInMonth;
                    const remainder = totalCells % 7;
                    if(remainder !== 0) {
                        for(let i = 0; i < (7 - remainder); i++) {
                            gridHtml += `<div class="bg-transparent rounded-xl border border-transparent"></div>`;
                        }
                    }

                    gridHtml += `</div></div>`;
                    
                    let html = `<div class="w-full bg-white rounded-[2rem] shadow-sm border border-slate-200/60 overflow-hidden flex flex-col h-[calc(100vh-220px)] relative">
                        ${headerHtml}
                        ${gridHtml}
                    </div>`;
                    
                    this.viewContainer.innerHTML = html;
                    
                    const label = document.getElementById('calendarMonthLabel');
                    if(label) label.innerText = `${monthNames[month]} ${year}`;
                    
                    lucide.createIcons();
                    return;
                }

                if(activeTasks.length === 0) {
                    this.viewContainer.innerHTML = `
                    <div class="w-full bg-white rounded-[2rem] shadow-sm border border-slate-200/60 overflow-hidden flex flex-col h-[calc(100vh-220px)] relative">
                        ${headerHtml}
                        <div class="flex-1 flex flex-col items-center justify-center text-slate-400">
                            <i data-lucide="clock" class="w-12 h-12 mb-4 text-slate-200"></i><span class="font-bold">Tidak ada tugas berjalan</span>
                        </div>
                    </div>`;
                    lucide.createIcons();
                    return;
                }

                let minTime = new Date().setHours(0,0,0,0) - (3 * 24 * 60 * 60 * 1000); 
                let maxTime = new Date().setHours(0,0,0,0) + (14 * 24 * 60 * 60 * 1000); 

                activeTasks.forEach(t => {
                    const start = new Date(t.created_at || t.due_date).setHours(0,0,0,0);
                    const end = new Date(t.due_date).setHours(0,0,0,0);
                    if (start < minTime) minTime = start;
                    if (end > maxTime) maxTime = end;
                });

                minTime -= 2 * 24 * 60 * 60 * 1000;
                maxTime += 2 * 24 * 60 * 60 * 1000;

                const days = [];
                for (let t = minTime; t <= maxTime; t += 24 * 60 * 60 * 1000) {
                    days.push(new Date(t));
                }

                const colWidth = 48;

                let ganttHtml = `
                    <div class="overflow-x-auto overflow-y-auto custom-scrollbar flex-1 relative">
                        <div class="min-w-max inline-block p-6">
                            <div class="flex border-b border-slate-200 pb-3 mb-3 sticky top-0 bg-white z-20">
                                <div class="w-72 shrink-0 font-extrabold text-slate-400 text-[10px] uppercase tracking-widest sticky left-0 bg-white z-30 flex items-center shadow-[4px_0_10px_-5px_rgba(0,0,0,0.05)] pl-2">Daftar Tugas Berjalan</div>
                                <div class="flex relative">
                                    ${days.map(d => {
                                        const isToday = d.setHours(0,0,0,0) === new Date().setHours(0,0,0,0);
                                        return `<div class="w-12 shrink-0 text-center font-bold text-[10px] ${isToday ? 'text-indigo-600 bg-indigo-50 rounded-md py-1' : 'text-slate-400 py-1'}">${d.getDate()}/${d.getMonth()+1}</div>`;
                                    }).join('')}
                                </div>
                            </div>

                            ${activeTasks.map(task => {
                                const tStart = new Date(task.created_at || task.due_date).setHours(0,0,0,0);
                                const tEnd = new Date(task.due_date).setHours(0,0,0,0);
                                
                                let leftIndex = Math.round((tStart - minTime) / (24 * 60 * 60 * 1000));
                                let duration = Math.round((tEnd - tStart) / (24 * 60 * 60 * 1000)) + 1;
                                if (leftIndex < 0) leftIndex = 0;
                                if (duration < 1) duration = 1;

                                const leftPos = leftIndex * colWidth;
                                const barWidth = duration * colWidth;
                                
                                const colorMap = {
                                    'tinggi': 'bg-rose-500',
                                    'sedang': 'bg-amber-500',
                                    'rendah': 'bg-sky-500'
                                };
                                const barColor = colorMap[task.priority] || 'bg-slate-500';
                                const pointerClass = this.state.role !== 'guest' ? 'cursor-pointer' : '';
                                const onclickStr = this.state.role !== 'guest' ? `onclick="app.openDetailModal(${task.id})"` : '';

                                return `
                                <div class="flex py-2 border-b border-slate-50 hover:bg-slate-50/50 transition-colors group ${pointerClass}" ${onclickStr}>
                                    <div class="w-72 shrink-0 pr-6 sticky left-0 bg-white group-hover:bg-slate-50/50 z-10 transition-colors shadow-[4px_0_10px_-5px_rgba(0,0,0,0.05)] flex flex-col justify-center pl-2">
                                        <p class="font-bold text-sm text-slate-800 truncate" title="${task.title.replace(/"/g, '&quot;')}">${task.title}</p>
                                        <div class="flex items-center space-x-2 mt-1">
                                            <span class="text-[9px] font-extrabold uppercase tracking-widest text-slate-400 border border-slate-200 px-1.5 py-0.5 rounded">${task.status}</span>
                                            <span class="text-[10px] font-bold text-slate-400 truncate">${task.division}</span>
                                        </div>
                                    </div>
                                    <div class="flex relative rounded-lg overflow-hidden h-12 items-center">
                                        ${days.map(d => {
                                            const isToday = d.setHours(0,0,0,0) === new Date().setHours(0,0,0,0);
                                            return `<div class="w-12 shrink-0 h-full border-r ${isToday ? 'border-indigo-100 bg-indigo-50/20' : 'border-slate-100/50'}"></div>`;
                                        }).join('')}
                                        
                                        <div class="absolute h-7 rounded-md ${barColor} shadow-sm opacity-90 group-hover:opacity-100 transition-opacity flex items-center px-2 min-w-[24px]" style="left: ${leftPos}px; width: ${barWidth}px;">
                                            <span class="text-[10px] font-bold text-white truncate drop-shadow-sm">${task.title.replace(/"/g, '&quot;')}</span>
                                        </div>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `;

                let fullHtml = `<div class="w-full bg-white rounded-[2rem] shadow-sm border border-slate-200/60 overflow-hidden flex flex-col h-[calc(100vh-220px)] relative">
                    ${headerHtml}
                    ${ganttHtml}
                </div>`;

                this.viewContainer.innerHTML = fullHtml;
                lucide.createIcons();
            },

            async renderSettings() {
                if (this.state.role !== 'admin') return;

                const { data: profiles } = await supabaseClient.from('profiles').select('*').order('name');
                
                let html = `
                <div class="flex flex-col gap-6 xl:gap-8 pb-12 max-w-7xl mx-auto">
                    
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 xl:gap-8">

                            <p class="text-xs text-slate-500 mb-6 font-medium leading-relaxed">Mendaftarkan akun baru akan mengakhiri sesi Anda saat ini. Pastikan Anda siap masuk kembali.</p>
                            <div class="flex flex-col gap-4 mt-auto">
                                <input type="text" id="newKodeInput" placeholder="ID Pengguna" class="w-full px-5 py-3.5 border border-slate-200 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-slate-50">
                                <input type="text" id="newNamaInput" placeholder="Nama Lengkap" class="w-full px-5 py-3.5 border border-slate-200 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-slate-50">
                                <input type="password" id="newKodePassword" placeholder="Kata Sandi" class="w-full px-5 py-3.5 border border-slate-200 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-slate-50">
                                <button onclick="app.createNewUserAccount()" class="w-full bg-slate-900 text-white px-6 py-4 rounded-2xl text-sm font-bold hover:bg-slate-800 transition-colors flex items-center justify-center"><i data-lucide="user-check" class="w-5 h-5 mr-2"></i>Daftarkan Akses</button>
                            </div>
                        </div>

                        <div class="flex flex-col gap-6 xl:gap-8">
                            <div class="bg-white p-6 sm:p-8 rounded-[2rem] shadow-sm border border-slate-200/60">
                                <h3 class="font-extrabold text-xl mb-6 flex items-center text-slate-900"><div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center mr-4"><i data-lucide="lock" class="w-4.5 h-4.5 text-white"></i></div> Keamanan</h3>
                                <div class="flex flex-col sm:flex-row gap-3">
                                    <input type="password" id="newPasswordInput" placeholder="Kata sandi baru..." class="flex-1 px-5 py-3.5 border border-slate-200 rounded-2xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-slate-50">
                                    <button onclick="app.changePassword()" class="bg-slate-900 text-white px-7 py-3.5 rounded-2xl text-sm font-bold hover:bg-slate-800 transition-colors whitespace-nowrap flex items-center justify-center"><i data-lucide="key" class="w-4 h-4 mr-2"></i>Perbarui</button>
                                </div>
                            </div>

                            <div class="bg-white p-6 sm:p-8 rounded-[2rem] shadow-sm border border-slate-200/60 flex-1">
                                <h3 class="font-extrabold text-xl mb-6 flex items-center text-slate-900"><div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center mr-4"><i data-lucide="users" class="w-4.5 h-4.5 text-white"></i></div> Tim Terdaftar</h3>
                                <div class="space-y-4 max-h-[220px] overflow-y-auto pr-2 custom-scrollbar">
                                    ${profiles.map(p => `
                                        <div class="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-slate-50 border border-slate-100 rounded-[1.5rem] shadow-sm">
                                            <div class="flex flex-col mb-3 sm:mb-0">
                                                <span class="text-sm font-extrabold text-slate-800 mb-1">${p.name || 'Tanpa Nama'}</span>
                                                <span class="text-[11px] font-bold text-slate-400 font-mono tracking-wide">ID: ${p.email}</span>
                                            </div>
                                            <div class="flex items-center space-x-3">
                                                <select onchange="app.updateRole('${p.id}', this.value)" class="text-xs font-bold bg-white border border-slate-200 text-slate-600 rounded-xl px-4 py-2.5 outline-none appearance-none pr-8 relative cursor-pointer" style="background-image: url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%2394a3b8%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E'); background-repeat: no-repeat, repeat; background-position: right .8em top 50%, 0 0; background-size: .65em auto, 100%;">
                                                    <option value="user" ${p.role === 'user' ? 'selected' : ''}>Staf</option>
                                                    <option value="admin" ${p.role === 'admin' ? 'selected' : ''}>Admin</option>
                                                </select>
                                                <button onclick="app.deleteUser('${p.id}')" class="text-slate-400 hover:text-red-600 hover:bg-red-50 p-2.5 rounded-xl transition-colors outline-none"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 xl:gap-8">
                        <div class="bg-white p-6 sm:p-8 rounded-[2rem] shadow-sm border border-slate-200/60 flex flex-col h-full">
                            <h3 class="font-extrabold text-xl mb-6 flex items-center text-slate-900"><div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center mr-4"><i data-lucide="layers" class="w-4.5 h-4.5 text-white"></i></div> Data Divisi</h3>
                            <div class="flex space-x-3 mb-6">
                                <input type="text" id="newDivision" placeholder="Nama divisi baru..." class="flex-1 px-5 py-3.5 border border-slate-200 rounded-xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-slate-50">
                                <button onclick="app.addSimpleItem('divisions', 'newDivision')" class="bg-slate-900 text-white px-5 py-3.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition-colors flex items-center justify-center"><i data-lucide="plus" class="w-5 h-5"></i></button>
                            </div>
                            <div class="overflow-x-auto rounded-xl border border-slate-200 flex-1 bg-white">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-slate-50 border-b border-slate-200">
                                        <tr>
                                            <th class="px-5 py-4 font-extrabold text-slate-600">Nama Divisi</th>
                                            <th class="px-5 py-4 font-extrabold text-slate-600 text-right w-28">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                                        ${this.state.divisions.map(d => `
                                        <tr class="hover:bg-slate-50 transition-colors group">
                                            <td class="px-5 py-4 font-semibold text-slate-800">${d.name}</td>
                                            <td class="px-5 py-4 text-right">
                                                <div class="flex items-center justify-end space-x-2">
                                                    <button onclick="app.editSimpleItem('divisions', ${d.id})" class="flex items-center justify-center text-slate-400 hover:text-blue-600 p-2 rounded-lg transition-colors outline-none"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                                    <button onclick="app.deleteSimpleItem('divisions', ${d.id})" class="flex items-center justify-center text-slate-400 hover:text-red-600 p-2 rounded-lg transition-colors outline-none"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                                </div>
                                            </td>
                                        </tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <div class="bg-white p-6 sm:p-8 rounded-[2rem] shadow-sm border border-slate-200/60 flex flex-col h-full">
                            <h3 class="font-extrabold text-xl mb-6 flex items-center text-slate-900"><div class="w-10 h-10 rounded-xl bg-slate-900 flex items-center justify-center mr-4"><i data-lucide="tag" class="w-4.5 h-4.5 text-white"></i></div> Data Kode HUB</h3>
                            <div class="flex space-x-3 mb-6">
                                <input type="text" id="newCategory" placeholder="Nama Kode HUB baru..." class="flex-1 px-5 py-3.5 border border-slate-200 rounded-xl text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:bg-slate-50">
                                <button onclick="app.addSimpleItem('categories', 'newCategory')" class="bg-slate-900 text-white px-5 py-3.5 rounded-xl text-sm font-bold hover:bg-slate-800 transition-colors flex items-center justify-center"><i data-lucide="plus" class="w-5 h-5"></i></button>
                            </div>
                            <div class="overflow-x-auto rounded-xl border border-slate-200 flex-1 bg-white">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-slate-50 border-b border-slate-200">
                                        <tr>
                                            <th class="px-5 py-4 font-extrabold text-slate-600">Nama Kode HUB</th>
                                            <th class="px-5 py-4 font-extrabold text-slate-600 text-right w-28">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody class="divide-y divide-slate-100">
                                        ${this.state.categories.map(c => `
                                        <tr class="hover:bg-slate-50 transition-colors group">
                                            <td class="px-5 py-4 font-semibold text-slate-800">${c.name}</td>
                                            <td class="px-5 py-4 text-right">
                                                <div class="flex items-center justify-end space-x-2">
                                                    <button onclick="app.editSimpleItem('categories', ${c.id})" class="flex items-center justify-center text-slate-400 hover:text-blue-600 p-2 rounded-lg transition-colors outline-none"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                                                    <button onclick="app.deleteSimpleItem('categories', ${c.id})" class="flex items-center justify-center text-slate-400 hover:text-red-600 p-2 rounded-lg transition-colors outline-none"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                                                </div>
                                            </td>
                                        </tr>`).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>`;
                this.viewContainer.innerHTML = html;
                lucide.createIcons();
            },

            async createNewUserAccount() {
                const kode = document.getElementById('newKodeInput').value.trim().toLowerCase();
                const pass = document.getElementById('newKodePassword').value;
                const nama = document.getElementById('newNamaInput').value.trim();

                if (!kode || !pass || !nama) {
                    this.showNotification('Harap lengkapi semua kolom pendaftaran.', 'error');
                    return;
                }

                const email = `${kodeAkses}@taskflow.local`;
                const { data, error } = await supabaseClient.auth.signUp({ email, password: pass });

                if (error) {
                    this.showNotification('Gagal membuat akses: ' + error.message, 'error');
                } else {
                    if (data.user) {
                        await supabaseClient.from('profiles').insert([{
                            id: data.user.id,
                            email: kode,
                            name: nama,
                            role: 'user'
                        }]);
                    }
                    this.showNotification('Akses dibuat. Mengakhiri sesi Anda...');
                    setTimeout(async () => {
                        await this.handleLogout();
                    }, 2000);
                }
            },

            async changePassword() {
                const newPassword = document.getElementById('newPasswordInput').value;
                if(!newPassword) return;
                
                const { error } = await supabaseClient.auth.updateUser({ password: newPassword });
                
                if(error) {
                    this.showNotification('Gagal memperbarui sandi', 'error');
                } else {
                    this.showNotification('Sandi berhasil diperbarui');
                    document.getElementById('newPasswordInput').value = '';
                }
            },

            async updateRole(id, newRole) {
                await supabaseClient.from('profiles').update({ role: newRole }).eq('id', id);
                this.showNotification('Hak akses diperbarui');
            },

            async deleteUser(id) {
                if(await this.showConfirm('Cabut akses login dan hapus data pengguna secara permanen?')) {
                    const { error } = await supabaseClient.rpc('delete_user', { user_id: id });
                    if (error) {
                        this.showNotification('Gagal mencabut akses', 'error');
                    } else {
                        this.showNotification('Akses berhasil dicabut');
                        await this.fetchData();
                        this.renderSettings();
                    }
                }
            },

            async addSimpleItem(table, inputId) {
                const val = document.getElementById(inputId).value.trim();
                if (!val) return;
                await supabaseClient.from(table).insert([{ name: val }]);
                this.showNotification('Data berhasil ditambahkan');
                await this.fetchData();
                this.renderSettings();
            },

            async editSimpleItem(table, id) {
                const items = table === 'divisions' ? this.state.divisions : this.state.categories;
                const item = items.find(i => i.id === id);
                if (!item) return;

                const newName = await this.showPrompt('Ubah penamaan:', item.name);
                if (newName && newName.trim() !== '' && newName !== item.name) {
                    await supabaseClient.from(table).update({ name: newName.trim() }).eq('id', id);
                    this.showNotification('Data diperbarui');
                    await this.fetchData();
                    this.renderSettings();
                }
            },

            async deleteSimpleItem(table, id) {
                if(await this.showConfirm('Hapus data klasifikasi ini?')) {
                    await supabaseClient.from(table).delete().eq('id', id);
                    this.showNotification('Data dihapus');
                    await this.fetchData();
                    this.renderSettings();
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
